<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stylish&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaja's Site</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="loading-dots">
        <!-- <h1>Under Progress</h1> -->
        <h1 class="dot one">.</h1><h1 class="dot two">.</h1><h1 class="dot three">.</h1>
    </div>

    <div class="typewriter">
        <h1>MEET YOU SOON!</h1>
    </div>
    <p class="countdown">It will be automatially redirected to my Django ToDo Project site within <span id="countdown">15</span> seconds...</p>

    <script>
        // Function to redirect after a specified time
        function redirectAfterCountdown() {
            let countdown = 15; // Initial countdown value
            const countdownElement = document.getElementById('countdown');

            const countdownInterval = setInterval(function() {
                countdownElement.textContent = countdown;

                if (countdown === 0) {
                    clearInterval(countdownInterval);
                    window.location.href = 'https://kajendiran.pythonanywhere.com/';
                }

                countdown--;
            }, 1000);
        }
        window.addEventListener('load', redirectAfterCountdown);
    </script>
</body>
</html>
